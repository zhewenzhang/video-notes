:31","date":"2026-02-09","tags":[],"summary":"2026 年超级碗期间 AI 广告扎堆出现，OpenAI、Anthropic、GenSpark 等公司都投放了广告。然而，一个疑似 OpenAI 硬件设备的广告在 Reddit 上泄露，该广告推广一款未来硬件设备，据传是 Johnny Iv"},{"file":"2026-03-06-mberman-big-lie-smarter-ai.html","title":"The Big Lie About Smarter AI Models","channel":"Matthew Berman","duration":"12:49","date":"2025-12-19","tags":[],"summary":"Matthew 提出\"大谎言\"的核心论点：当前 AI 模型已经达到\"博士级智能\"，对于绝大多数使用场景，继续提升模型能力不会带来明显价值。他以自己为例，日常使用中很少需要深度研究或最高级思考功能，大多数情况下普通模型已经足够。这个观点挑战了"},{"file":"2026-03-06-a16z-creativity-over-code.html","title":"Why Creativity Will Matter More Than Code","channel":"a16z","duration":"1:24:15","date":"","tags":[],"summary":"这是自2010-2012年以来消费者投资领域最好的机会。消费者开始有机地下载产品，愿意为高端订阅付费（ChatGPT $200/月、Gemini Ultra $250/月、Grok $300/月），这种付费意愿在消费者领域多年未见。技术爱好"}],CHANNELS=["a16z","Invest Like The Best","Matthew Berman","All-In Podcast","Data Driven NYC"],TAGS=["#492","#AllInPodcast","#AI","#Robotics","#AR","#Manufacturing","#CES2026","#GoogleDeepMind","#AGI","#WorldModels"];const state={channel:'all',tag:'all',date:'all',sort:'new',query:''};function init(){renderFilters();applyFilters();bindEvents();if(location.hash)loadHash();}function renderFilters(){document.getElementById('chList').innerHTML='<button class="filter-btn active" data-filter="channel" data-value="all">全部</button>'+CHANNELS.map(c=>'<button class="filter-btn" data-filter="channel" data-value="'+c+'">'+c+'</button>').join('');document.getElementById('tagList').innerHTML='<button class="filter-btn small active" data-filter="tag" data-value="all">全部</button>'+TAGS.map(t=>'<button class="filter-btn small" data-filter="tag" data-value="'+t+'">'+t+'</button>').join('');}function applyFilters(){let results=NOTES.filter(n=>{if(state.channel!=='all'&&n.channel!==state.channel)return false;if(state.tag!=='all'&&!n.tags.includes(state.tag))return false;if(state.date!=='all'){const d=new Date(n.date||'2000-01-01'),now=new Date();if(state.date==='week'&&(now-d)>7*24*60*60*1000)return false;if(state.date==='month'&&(now-d)>30*24*60*60*1000)return false;}if(state.query){const q=state.query.toLowerCase();if(!n.title.toLowerCase().includes(q)&&!n.summary.toLowerCase().includes(q))return false;}return true;});if(state.sort==='new')results.sort((a,b)=>(b.date||'').localeCompare(a.date||''));if(state.sort==='old')results.sort((a,b)=>(a.date||'').localeCompare(b.date||''));if(state.sort==='channel')results.sort((a,b)=>a.channel.localeCompare(b.channel));document.getElementById('resultCount').textContent=results.length;const grid=document.getElementById('notes');if(results.length===0){grid.innerHTML='<div class="empty"><div class="empty-icon">⌕</div><h3>没有找到笔记</h3><p>尝试调整筛选条件</p></div>';}else{grid.innerHTML=results.map((n,i)=>'<article class="note-card"><span class="note-number">'+(i+1)+'</span><div class="note-meta">'+(n.channel?'<span>'+n.channel+'</span>':'')+(n.duration?'<span>'+n.duration+'</span>':'')+(n.date?'<span>'+n.date+'</span>':'')+'</div><h2><a href="./insights/'+n.file+'">'+n.title+'</a></h2><div class="note-tags">'+n.tags.slice(0,3).map(t=>'<span class="note-tag">'+t+'</span>').join('')+'</div><p class="note-summary">'+n.summary+'</p></article>').join('');}const h=[];if(state.channel!=='all')h.push('ch='+encodeURIComponent(state.channel));if(state.tag!=='all')h.push('tag='+encodeURIComponent(state.tag));if(state.date!=='all')h.push('date='+state.date);if(state.sort!=='new')h.push('sort='+state.sort);history.replaceState(null,'',h.length?'#'+h.join('&'):location.pathname);}function bindEvents(){document.querySelector('.filter-header').addEventListener('click',()=>{document.querySelector('.filters').classList.toggle('open');});document.getElementById('searchInput').addEventListener('input',e=>{state.query=e.target.value;applyFilters();});document.getElementById('chList').addEventListener('click',e=>{if(e.target.matches('[data-filter="channel"]')){document.querySelectorAll('#chList .filter-btn').forEach(b=>b.classList.remove('active'));e.target.classList.add('active');state.channel=e.target.dataset.value;applyFilters();}});document.getElementById('tagList').addEventListener('click',e=>{if(e.target.matches('[data-filter="tag"]')){document.querySelectorAll('#tagList .filter-btn').forEach(b=>b.classList.remove('active'));e.target.classList.add('active');state.tag=e.target.dataset.value;applyFilters();}});document.querySelectorAll('[data-filter="date"]').forEach(b=>{b.addEventListener('click',e=>{document.querySelectorAll('[data-filter="date"]').forEach(x=>x.classList.remove('active'));e.target.classList.add('active');state.date=e.target.dataset.value;applyFilters();});});document.querySelectorAll('[data-filter="sort"]').forEach(b=>{b.addEventListener('click',e=>{document.querySelectorAll('[data-filter="sort"]').forEach(x=>x.classList.remove('active'));e.target.classList.add('active');state.sort=e.target.dataset.value;applyFilters();});});document.getElementById('clearBtn').addEventListener('click',()=>{state={channel:'all',tag:'all',date:'all',sort:'new',query:''};document.getElementById('searchInput').value='';document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));document.querySelectorAll('[data-value="all"]').forEach(b=>b.classList.add('active'));applyFilters();});const fab=document.querySelector('.fab');window.addEventListener('scroll',()=>{fab.classList.toggle('visible',scrollY>500);});fab.addEventListener('click',()=>{window.scrollTo({top:0,behavior:'smooth'});});}function loadHash(){const params=new URLSearchParams(location.hash.slice(1));if(params.has('ch')){state.channel=params.get('ch');const btn=document.querySelector('[data-filter="channel"][data-value="'+state.channel+'"]');if(btn){document.querySelectorAll('#chList .filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}}if(params.has('tag')){state.tag=params.get('tag');const btn=document.querySelector('[data-filter="tag"][data-value="'+state.tag+'"]');if(btn){document.querySelectorAll('#tagList .filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}}applyFilters();}init();</script>
