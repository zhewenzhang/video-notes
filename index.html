<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>小视频大思考</title>
<meta name="description" content="深度视频笔记，每日更新">
<style>
:root{
  --bg:#f8fafc;
  --text:#1e293b;
  --text-light:#64748b;
  --primary:#6366f1;
  --primary-light:#818cf8;
  --primary-dark:#4f46e5;
  --secondary:#ec4899;
  --accent:#06b6d4;
  --card:#ffffff;
  --border:#e2e8f0;
  --shadow:0 4px 6px -1px rgba(0,0,0,0.1),0 2px 4px -1px rgba(0,0,0,0.06);
  --shadow-lg:0 20px 25px -5px rgba(0,0,0,0.1),0 10px 10px -5px rgba(0,0,0,0.04);
  --radius:16px;
  --radius-sm:8px;
}
[data-dark]{
  --bg:#0f172a;
  --text:#f1f5f9;
  --text-light:#94a3b8;
  --primary:#818cf8;
  --primary-light:#a5b4fc;
  --primary-dark:#6366f1;
  --card:#1e293b;
  --border:#334155;
  --shadow:0 4px 6px -1px rgba(0,0,0,0.3),0 2px 4px -1px rgba(0,0,0,0.2);
  --shadow-lg:0 20px 25px -5px rgba(0,0,0,0.4),0 10px 10px -5px rgba(0,0,0,0.3);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font:16px/1.7 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);transition:background .3s,color .3s;min-height:100vh}

/* 渐变背景 */
.hero-bg{position:fixed;top:0;left:0;right:0;height:400px;background:linear-gradient(135deg,var(--primary) 0%,var(--secondary) 50%,var(--accent) 100%);opacity:.08;z-index:-1;pointer-events:none}
[data-dark] .hero-bg{opacity:.05}

/* 容器 */
.wrap{max-width:1000px;margin:0 auto;padding:24px}

/* 头部 */
header{text-align:center;padding:48px 0 32px;position:relative}
header::before{content:"";position:absolute;top:-24px;left:50%;transform:translateX(-50%);width:120px;height:120px;background:linear-gradient(135deg,var(--primary),var(--secondary));border-radius:50%;opacity:.1;filter:blur(40px)}
header h1{font-size:2.5rem;font-weight:800;margin-bottom:12px;background:linear-gradient(135deg,var(--primary),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-0.02em}
header p{color:var(--text-light);font-size:1.1rem;font-weight:400}

/* 统计卡片 */
.stats{display:flex;gap:16px;margin-top:32px;justify-content:center;flex-wrap:wrap}
.stat{background:var(--card);padding:20px 28px;border-radius:var(--radius);box-shadow:var(--shadow);text-align:center;min-width:120px;transition:all .3s;border:1px solid var(--border)}
.stat:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.stat-num{font-size:2rem;font-weight:800;background:linear-gradient(135deg,var(--primary),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-label{font-size:.85rem;color:var(--text-light);margin-top:4px;font-weight:500}

/* 搜索框 */
.search{position:relative;margin:32px 0;max-width:600px;margin-left:auto;margin-right:auto}
.search input{width:100%;padding:18px 24px 18px 56px;font-size:1rem;border:2px solid var(--border);border-radius:var(--radius);background:var(--card);color:var(--text);transition:all .3s;box-shadow:var(--shadow)}
.search::before{content:"🔍";position:absolute;left:20px;top:50%;transform:translateY(-50%);font-size:1.3rem;opacity:.6}
.search input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 4px rgba(99,102,241,.1)}

/* 筛选器 */
.filters{background:var(--card);border-radius:var(--radius);margin:24px 0;box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden}
.filter-head{display:flex;justify-content:space-between;align-items:center;padding:20px 24px;cursor:pointer;transition:all .2s;background:linear-gradient(90deg,rgba(99,102,241,.05),transparent)}
.filter-head:hover{background:linear-gradient(90deg,rgba(99,102,241,.08),transparent)}
.filter-title{font-weight:700;font-size:1.1rem;display:flex;align-items:center;gap:12px}
.filter-count{background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;padding:4px 12px;border-radius:20px;font-size:.85rem;font-weight:600;box-shadow:0 2px 8px rgba(99,102,241,.3)}
.filter-toggle{font-size:1.2rem;transition:transform .3s;color:var(--text-light)}
.filter-toggle.open{transform:rotate(180deg)}
.filter-body{padding:0 24px;max-height:0;overflow:hidden;transition:max-height .4s ease}
.filter-body.open{padding:24px;max-height:900px}
.filter-row{margin-bottom:24px}
.filter-row:last-child{margin-bottom:0}
.filter-label{font-size:.9rem;color:var(--text-light);margin-bottom:12px;font-weight:600;display:flex;align-items:center;gap:8px}
.filter-btns{display:flex;flex-wrap:wrap;gap:10px}
.btn{padding:10px 18px;border:2px solid var(--border);border-radius:24px;background:var(--card);color:var(--text);cursor:pointer;font-size:.9rem;font-weight:500;transition:all .2s;white-space:nowrap}
.btn:hover{border-color:var(--primary-light);transform:translateY(-2px);box-shadow:0 4px 12px rgba(99,102,241,.15)}
.btn.on{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;border-color:transparent;box-shadow:0 4px 12px rgba(99,102,241,.3)}
.btn-sm{padding:8px 14px;font-size:.85rem;border-radius:20px}
.tag-more{color:var(--text-light);font-size:.85rem;margin-top:12px;padding:8px 0}

/* 笔记卡片网格 */
.notes{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:24px;margin-top:32px}
.card{background:var(--card);border-radius:var(--radius);padding:28px;box-shadow:var(--shadow);border:1px solid var(--border);transition:all .3s;position:relative;overflow:hidden}
.card::before{content:"";position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--primary),var(--secondary));opacity:0;transition:opacity .3s}
.card:hover{transform:translateY(-6px);box-shadow:var(--shadow-lg)}
.card:hover::before{opacity:1}
.card h2{font-size:1.25rem;margin-bottom:16px;line-height:1.5;font-weight:700}
.card h2 a{color:var(--text);text-decoration:none}
.card h2 a:hover{color:var(--primary)}
.card-meta{display:flex;gap:14px;flex-wrap:wrap;font-size:.9rem;color:var(--text-light);margin-bottom:16px}
.card-meta span{display:flex;align-items:center;gap:6px;background:rgba(99,102,241,.08);padding:6px 12px;border-radius:20px}
.card-tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.card-tags .btn-sm{background:rgba(99,102,241,.08);border-color:transparent;color:var(--primary);font-weight:500}
.card-tags .btn-sm:hover{background:var(--primary);color:#fff}
.card-summary{color:var(--text-light);font-size:.95rem;line-height:1.7}
.empty{text-align:center;padding:100px 40px;color:var(--text-light)}
.empty-icon{font-size:4rem;margin-bottom:20px;opacity:.5}
.empty h3{font-size:1.5rem;margin-bottom:12px;color:var(--text)}
.empty p{font-size:1rem}

/* 详情页 */
.back{display:inline-flex;align-items:center;gap:8px;color:var(--primary);margin-bottom:24px;padding:12px 20px;border-radius:var(--radius-sm);background:var(--card);border:1px solid var(--border);font-weight:500;transition:all .2s}
.back:hover{background:var(--primary);color:#fff;border-color:var(--primary);transform:translateX(-4px)}
.meta-bar{display:flex;gap:16px;flex-wrap:wrap;padding:20px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin:24px 0;font-size:.95rem;color:var(--text-light)}
.meta-bar span{display:flex;align-items:center;gap:8px}
.content{font-size:1.05rem;line-height:1.9}
.content h1,.content h2,.content h3{margin:40px 0 20px;font-weight:700}
.content h2{font-size:1.6rem;color:var(--primary);padding-bottom:12px;border-bottom:2px solid var(--border)}
.content h3{font-size:1.3rem;color:var(--text-light)}
.content p{margin:20px 0}
.content blockquote{border-left:4px solid var(--primary);padding:20px 24px;margin:28px 0;background:linear-gradient(90deg,rgba(99,102,241,.05),transparent);border-radius:0 var(--radius-sm) var(--radius-sm) 0;font-style:italic;color:var(--text-light)}
.content code{background:rgba(99,102,241,.1);color:var(--primary);padding:4px 10px;border-radius:6px;font-size:.9em;font-family:monospace;font-weight:500}
.content pre{background:#1e293b;padding:24px;border-radius:var(--radius);overflow-x:auto;margin:28px 0}
.content pre code{background:none;color:#e2e8f0;padding:0}
.content table{width:100%;border-collapse:collapse;margin:28px 0;border-radius:var(--radius-sm);overflow:hidden;box-shadow:var(--shadow)}
.content th{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;padding:14px 16px;text-align:left;font-weight:600}
.content td{border:1px solid var(--border);padding:14px 16px}
.content tr:nth-child(even){background:rgba(99,102,241,.03)}
.nav-btns{display:flex;justify-content:space-between;margin-top:60px;padding-top:32px;border-top:2px solid var(--border);gap:20px}
.nav-btn{flex:1;padding:16px 24px;border:2px solid var(--border);border-radius:var(--radius);color:var(--primary);background:var(--card);font-weight:600;text-align:center;transition:all .2s}
.nav-btn:hover{background:var(--primary);color:#fff;border-color:var(--primary);transform:translateY(-3px);box-shadow:0 8px 20px rgba(99,102,241,.25)}

/* 页脚 */
footer{text-align:center;padding:48px 0;margin-top:60px;border-top:1px solid var(--border);color:var(--text-light)}
footer p{margin:8px 0}
footer a{color:var(--primary);font-weight:500}
footer a:hover{text-decoration:underline}

/* 进度条 */
.progress{position:fixed;top:0;left:0;height:4px;background:linear-gradient(90deg,var(--primary),var(--secondary),var(--accent));width:0;z-index:1000;transition:width .1s;box-shadow:0 2px 8px rgba(99,102,241,.3)}

/* 浮动按钮 */
.fab{position:fixed;width:56px;height:56px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;cursor:pointer;font-size:1.4rem;z-index:100;box-shadow:0 4px 16px rgba(99,102,241,.4);transition:all .3s;display:flex;align-items:center;justify-content:center}
.fab:hover{transform:scale(1.1) rotate(10deg);box-shadow:0 6px 24px rgba(99,102,241,.5)}
.theme-btn{top:24px;right:24px}
.to-top{bottom:32px;right:32px;opacity:0;visibility:hidden;transform:translateY(20px)}
.to-top.visible{opacity:1;visibility:visible;transform:translateY(0)}

/* 动画 */
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.card{animation:fadeIn .5s ease backwards}
.card:nth-child(1){animation-delay:.05s}
.card:nth-child(2){animation-delay:.1s}
.card:nth-child(3){animation-delay:.15s}
.card:nth-child(4){animation-delay:.2s}
.card:nth-child(5){animation-delay:.25s}

/* 移动端 */
@media(max-width:768px){
  .wrap{padding:16px}
  header h1{font-size:1.9rem}
  header{padding:32px 0 24px}
  .stats{gap:12px}
  .stat{min-width:100px;padding:16px 20px}
  .stat-num{font-size:1.6rem}
  .notes{grid-template-columns:1fr}
  .filter-body{padding:20px}
  .fab{width:48px;height:48px;font-size:1.2rem}
  .to-top{bottom:20px;right:20px}
}
</style>
</head>

const state={channel:'all',tag:'all',date:'all',sort:'new',query:''};
function init(){renderFilters();applyFilters();bindEvents();if(matchMedia('(prefers-color-scheme:dark)').matches){document.documentElement.setAttribute('data-dark','');document.querySelector('.theme-btn').textContent='☀️';}if(location.hash)loadHash();}
function renderFilters(){document.getElementById('chList').innerHTML='<button class="btn on" data-ch="all">全部频道</button>'+CHANNELS.map(c=>'<button class="btn" data-ch="'+c+'">'+c+'</button>').join('');document.getElementById('tagList').innerHTML='<button class="btn-sm on" data-tag="all">全部标签</button>'+TAGS.map(t=>'<button class="btn-sm" data-tag="'+t+'">'+t+'</button>').join('')+(TAGS.length>=12?'<div class="tag-more">还有 '+(TAGS.length-12)+' 个标签...</div>':'');}
function applyFilters(){let results=NOTES.filter(n=>{if(state.channel!=='all'&&n.channel!==state.channel)return false;if(state.tag!=='all'&&!n.tags.includes(state.tag))return false;if(state.date!=='all'){const d=new Date(n.date||'2000-01-01'),now=new Date();if(state.date==='week'&&(now-d)>7*24*60*60*1000)return false;if(state.date==='month'&&(now-d)>30*24*60*60*1000)return false;}if(state.query){const q=state.query.toLowerCase();if(!n.title.toLowerCase().includes(q)&&!n.summary.toLowerCase().includes(q))return false;}return true;});if(state.sort==='new')results.sort((a,b)=>(b.date||'').localeCompare(a.date||''));if(state.sort==='old')results.sort((a,b)=>(a.date||'').localeCompare(b.date||''));if(state.sort==='channel')results.sort((a,b)=>a.channel.localeCompare(b.channel));const grid=document.getElementById('notes'),count=document.getElementById('resultCount'),filterCount=document.getElementById('filterCount');count.textContent=results.length;filterCount.textContent=results.length;if(results.length===0){grid.innerHTML='<div class="empty"><div class="empty-icon">🔍</div><h3>没有找到匹配的笔记</h3><p>试试调整筛选条件或搜索其他关键词</p></div>';}else{grid.innerHTML=results.map(n=>'<article class="card"><h2><a href="./insights/'+n.file+'">'+n.title+'</a></h2><div class="card-meta">'+(n.channel?'<span>📺 '+n.channel+'</span>':'')+(n.duration?'<span>⏱️ '+n.duration+'</span>':'')+(n.date?'<span>📅 '+n.date+'</span>':'')+'</div>'+(n.tags.length?'<div class="card-tags">'+n.tags.slice(0,4).map(t=>'<span class="btn-sm">'+t+'</span>').join('')+'</div>':'')+'<p class="card-summary">'+n.summary+'</p></article>').join('');}const h=[];if(state.channel!=='all')h.push('ch='+encodeURIComponent(state.channel));if(state.tag!=='all')h.push('tag='+encodeURIComponent(state.tag));if(state.date!=='all')h.push('date='+state.date);if(state.sort!=='new')h.push('sort='+state.sort);history.replaceState(null,'',h.length?'#'+h.join('&'):location.pathname);}
function bindEvents(){document.getElementById('search').addEventListener('input',e=>{state.query=e.target.value;applyFilters();});document.querySelector('.filter-head').addEventListener('click',()=>{document.querySelector('.filter-body').classList.toggle('open');document.querySelector('.filter-toggle').classList.toggle('open');});document.getElementById('chList').addEventListener('click',e=>{if(e.target.matches('[data-ch]')){document.querySelectorAll('#chList .btn').forEach(b=>b.classList.remove('on'));e.target.classList.add('on');state.channel=e.target.dataset.ch;applyFilters();}});document.getElementById('tagList').addEventListener('click',e=>{if(e.target.matches('[data-tag]')){document.querySelectorAll('#tagList .btn-sm').forEach(b=>b.classList.remove('on'));e.target.classList.add('on');state.tag=e.target.dataset.tag;applyFilters();}});document.querySelectorAll('[data-date]').forEach(b=>{b.addEventListener('click',e=>{document.querySelectorAll('[data-date]').forEach(x=>x.classList.remove('on'));e.target.classList.add('on');state.date=e.target.dataset.date;applyFilters();});});document.querySelectorAll('[data-sort]').forEach(b=>{b.addEventListener('click',e=>{document.querySelectorAll('[data-sort]').forEach(x=>x.classList.remove('on'));e.target.classList.add('on');state.sort=e.target.dataset.sort;applyFilters();});});document.getElementById('clearBtn').addEventListener('click',()=>{state.channel=state.tag='all';state.date='all';state.sort='new';state.query='';document.getElementById('search').value='';document.querySelectorAll('.btn.on,.btn-sm.on').forEach(b=>b.classList.remove('on'));document.querySelector('[data-ch="all"]').classList.add('on');document.querySelector('[data-tag="all"]').classList.add('on');document.querySelector('[data-date="all"]').classList.add('on');applyFilters();});document.querySelector('.theme-btn').addEventListener('click',()=>{const isDark=document.documentElement.toggleAttribute('data-dark');document.querySelector('.theme-btn').textContent=isDark?'☀️':'🌙';});const toTop=document.querySelector('.to-top');window.addEventListener('scroll',()=>{document.querySelector('.progress').style.width=(scrollY/(document.body.scrollHeight-innerHeight)*100)+'%';toTop.classList.toggle('visible',scrollY>400);});toTop.addEventListener('click',()=>{window.scrollTo({top:0,behavior:'smooth'});});}
function loadHash(){const params=new URLSearchParams(location.hash.slice(1));if(params.has('ch')){state.channel=params.get('ch');const btn=document.querySelector('[data-ch="'+state.channel+'"]');if(btn){document.querySelectorAll('#chList .btn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');}}if(params.has('tag')){state.tag=params.get('tag');const btn=document.querySelector('[data-tag="'+state.tag+'"]');if(btn){document.querySelectorAll('#tagList .btn-sm').forEach(b=>b.classList.remove('on'));btn.classList.add('on');}}if(params.has('date')){state.date=params.get('date');document.querySelectorAll('[data-date]').forEach(x=>x.classList.remove('on'));const btn=document.querySelector('[data-date="'+state.date+'"]');if(btn)btn.classList.add('on');}if(params.has('sort')){state.sort=params.get('sort');document.querySelectorAll('[data-sort]').forEach(x=>x.classList.remove('on'));const btn=document.querySelector('[data-sort="'+state.sort+'"]');if(btn)btn.classList.add('on');}}
init();
</script>
