<head>

  <style>
:root{--bg:#fff;--text:#1a1a1a;--primary:#2563eb;--muted:#64748b;--border:#e2e8f0;--card:#f8fafc}
[data-dark]{--bg:#0f172a;--text:#e2e8f0;--primary:#60a5fa;--muted:#94a3b8;--border:#1e293b;--card:#1e293b}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);transition:background .2s}
.wrap{max-width:900px;margin:0 auto;padding:20px}
a{color:var(--primary);text-decoration:none}
a:hover{text-decoration:underline}

/* 头部 */
header{padding:30px 0;border-bottom:1px solid var(--border);margin-bottom:30px}
header h1{font-size:1.8rem;margin-bottom:8px}
header p{color:var(--muted);font-size:.9rem}
.stats{display:flex;gap:15px;margin-top:15px}
.stat{background:var(--card);padding:8px 16px;border-radius:8px;text-align:center}
.stat-num{font-size:1.4rem;font-weight:700;color:var(--primary)}
.stat-label{font-size:.75rem;color:var(--muted)}

/* 搜索 */
.search{position:relative;margin:20px 0}
.search input{width:100%;padding:14px 20px;font-size:1rem;border:2px solid var(--border);border-radius:12px;background:var(--bg);color:var(--text)}
.search input:focus{outline:none;border-color:var(--primary)}

/* 筛选器 */
.filters{background:var(--card);border-radius:12px;margin:20px 0;overflow:hidden}
.filter-head{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;cursor:pointer;border-bottom:1px solid var(--border)}
.filter-head:hover{background:var(--border)}
.filter-title{font-weight:600}
.filter-toggle{color:var(--muted);transition:transform .2s}
.filter-toggle.open{transform:rotate(180deg)}
.filter-body{padding:0 20px;max-height:0;overflow:hidden;transition:all .3s}
.filter-body.open{padding:20px;max-height:1000px}
.filter-row{margin-bottom:16px}
.filter-label{font-size:.85rem;color:var(--muted);margin-bottom:8px}
.filter-btns{display:flex;flex-wrap:wrap;gap:6px}
.btn{padding:6px 14px;border:1px solid var(--border);border-radius:20px;background:var(--bg);color:var(--text);cursor:pointer;font-size:.85rem;transition:all .15s}
.btn:hover{border-color:var(--primary)}
.btn.on{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-sm{padding:4px 10px;font-size:.8rem}

/* 笔记卡片 */
.notes{display:grid;gap:16px;margin-top:20px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;transition:transform .15s,box-shadow .15s}
.card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
.card h2{font-size:1.1rem;margin-bottom:10px}
.card h2 a{color:var(--text)}
.card h2 a:hover{color:var(--primary)}
.card-meta{display:flex;gap:12px;flex-wrap:wrap;font-size:.85rem;color:var(--muted);margin-bottom:10px}
.card-tags{display:flex;gap:6px;flex-wrap:wrap}
.card-summary{color:var(--muted);font-size:.9rem;line-height:1.5}
.empty{text-align:center;padding:60px 20px;color:var(--muted)}

/* 详情页 */
.back{display:inline-flex;align-items:center;gap:6px;color:var(--primary);margin-bottom:20px}
.meta-bar{display:flex;gap:15px;flex-wrap:wrap;padding:12px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin:15px 0;font-size:.9rem;color:var(--muted)}
.content{font-size:1.05rem;line-height:1.8}
.content h1,.content h2,.content h3{margin:25px 0 12px}
.content h2{border-bottom:2px solid var(--border);padding-bottom:8px}
.content p{margin:12px 0}
.content blockquote{border-left:4px solid var(--primary);padding:10px 20px;margin:15px 0;background:var(--card);border-radius:0 8px 8px 0}
.content code{background:var(--card);padding:2px 6px;border-radius:4px;font-size:.9em}
.content pre{background:var(--card);padding:16px;border-radius:8px;overflow-x:auto;margin:15px 0}
.content table{width:100%;border-collapse:collapse;margin:15px 0}
.content td,.content th{border:1px solid var(--border);padding:10px;text-align:left}
.nav-btns{display:flex;justify-content:space-between;margin-top:40px;padding-top:20px;border-top:1px solid var(--border)}
.nav-btn{padding:10px 20px;border:1px solid var(--border);border-radius:8px;color:var(--primary)}

/* 页脚 */
footer{text-align:center;padding:30px 0;margin-top:40px;border-top:1px solid var(--border);color:var(--muted);font-size:.85rem}

/* 进度条 */
.progress{position:fixed;top:0;left:0;height:3px;background:var(--primary);width:0;z-index:1000;transition:width .1s}

/* 深色按钮 */
.theme-btn{position:fixed;top:20px;right:20px;width:40px;height:40px;border-radius:50%;border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:1.2rem;z-index:100}

/* 移动端 */
@media(max-width:600px){
  .wrap{padding:15px}
  header h1{font-size:1.5rem}
  .stats{flex-wrap:wrap}
  .stat{flex:1;min-width:80px}
  .filter-body{padding:15px}
  .card{padding:16px}
}
</style>
</head>

function renderFilters(){
  document.getElementById('chList').innerHTML = 
    '<button class="btn on" data-ch="all">全部</button>' +
    CHANNELS.map(c => `<button class="btn" data-ch="${c}">${c}</button>`).join('');
    
  document.getElementById('tagList').innerHTML = 
    '<button class="btn-sm on" data-tag="all">全部</button>' +
    TAGS.map(t => `<button class="btn-sm" data-tag="${t}">${t}</button>`).join('');
}

// 应用筛选
function applyFilters(){
  let results = NOTES.filter(n => {
    if(state.channel !== 'all' && n.channel !== state.channel) return false;
    if(state.tag !== 'all' && !n.tags.includes(state.tag)) return false;
    if(state.date !== 'all'){
      const d = new Date(n.date || '2000-01-01');
      const now = new Date();
      if(state.date === 'week' && (now - d) > 7*24*60*60*1000) return false;
      if(state.date === 'month' && (now - d) > 30*24*60*60*1000) return false;
    }
    if(state.query){
      const q = state.query.toLowerCase();
      if(!n.title.toLowerCase().includes(q) && !n.summary.toLowerCase().includes(q)) return false;
    }
    return true;
  });
  
  // 排序
  if(state.sort === 'new') results.sort((a,b) => (b.date||'').localeCompare(a.date||''));
  if(state.sort === 'old') results.sort((a,b) => (a.date||'').localeCompare(b.date||''));
  if(state.sort === 'channel') results.sort((a,b) => a.channel.localeCompare(b.channel));
  
  // 渲染
  const grid = document.getElementById('notes');
  const count = document.getElementById('count');
  
  if(results.length === 0){
    grid.innerHTML = '<div class="empty">没有找到匹配的笔记</div>';
  } else {
    grid.innerHTML = results.map(n => `
      <article class="card">
        <h2><a href="./insights/${n.file}">${n.title}</a></h2>
        <div class="card-meta">
          ${n.channel ? `<span>📺 ${n.channel}</span>` : ''}
          ${n.duration ? `<span>⏱️ ${n.duration}</span>` : ''}
          ${n.date ? `<span>📅 ${n.date}</span>` : ''}
        </div>
        ${n.tags.length ? `<div class="card-tags">${n.tags.slice(0,4).map(t => `<span class="btn-sm">${t}</span>`).join('')}</div>` : ''}
        <p class="card-summary">${n.summary}</p>
      </article>
    `).join('');
  }
  
  count.textContent = results.length;
  
  // 更新 URL
  const h = [];
  if(state.channel !== 'all') h.push('ch=' + encodeURIComponent(state.channel));
  if(state.tag !== 'all') h.push('tag=' + encodeURIComponent(state.tag));
  if(state.date !== 'all') h.push('date=' + state.date);
  if(state.sort !== 'new') h.push('sort=' + state.sort);
  history.replaceState(null, '', h.length ? '#' + h.join('&') : location.pathname);
}

// 绑定事件
function bindEvents(){
  // 搜索
  document.getElementById('search').addEventListener('input', e => {
    state.query = e.target.value;
    applyFilters();
  });
  
  // 筛选器展开
  document.querySelector('.filter-head').addEventListener('click', () => {
    document.querySelector('.filter-body').classList.toggle('open');
    document.querySelector('.filter-toggle').classList.toggle('open');
  });
  
  // 频道
  document.getElementById('chList').addEventListener('click', e => {
    if(e.target.matches('[data-ch]')){
      document.querySelectorAll('#chList .btn').forEach(b => b.classList.remove('on'));
      e.target.classList.add('on');
      state.channel = e.target.dataset.ch;
      applyFilters();
    }
  });
  
  // 标签
  document.getElementById('tagList').addEventListener('click', e => {
    if(e.target.matches('[data-tag]')){
      document.querySelectorAll('#tagList .btn-sm').forEach(b => b.classList.remove('on'));
      e.target.classList.add('on');
      state.tag = e.target.dataset.tag;
      applyFilters();
    }
  });
  
  // 日期
  document.querySelectorAll('[data-date]').forEach(b => {
    b.addEventListener('click', e => {
      document.querySelectorAll('[data-date]').forEach(x => x.classList.remove('on'));
      e.target.classList.add('on');
      state.date = e.target.dataset.date;
      applyFilters();
    });
  });
  
  // 排序
  document.querySelectorAll('[data-sort]').forEach(b => {
    b.addEventListener('click', e => {
      document.querySelectorAll('[data-sort]').forEach(x => x.classList.remove('on'));
      e.target.classList.add('on');
      state.sort = e.target.dataset.sort;
      applyFilters();
    });
  });
  
  // 清除
  document.getElementById('clearBtn').addEventListener('click', () => {
    state.channel = state.tag = 'all';
    state.date = state.sort = 'all';
    state.query = '';
    document.getElementById('search').value = '';
    document.querySelectorAll('.btn.on, .btn-sm.on').forEach(b => b.classList.remove('on'));
    document.querySelector('[data-ch="all"]').classList.add('on');
    document.querySelector('[data-tag="all"]').classList.add('on');
    document.querySelector('[data-date="all"]').classList.add('on');
    applyFilters();
  });
  
  // 深色模式
  document.querySelector('.theme-btn').addEventListener('click', () => {
    const isDark = document.documentElement.toggleAttribute('data-dark');
    document.querySelector('.theme-btn').textContent = isDark ? '☀️' : '🌙';
  });
  
  // 进度条
  window.addEventListener('scroll', () => {
    const pct = scrollY / (document.body.scrollHeight - innerHeight);
    document.querySelector('.progress').style.width = (pct * 100) + '%';
  });
}

// 加载 URL 哈希
function loadHash(){
  const params = new URLSearchParams(location.hash.slice(1));
  if(params.has('ch')){state.channel = params.get('ch');document.querySelector(`[data-ch="${state.channel}"]`)?.classList.add('on');document.querySelector('[data-ch="all"]')?.classList.remove('on');}
  if(params.has('tag')){state.tag = params.get('tag');document.querySelector(`[data-tag="${state.tag}"]`)?.classList.add('on');document.querySelector('[data-tag="all"]')?.classList.remove('on');}
  if(params.has('date')){state.date = params.get('date');document.querySelector(`[data-date="${state.date}"]`)?.classList.add('on');document.querySelector('[data-date="all"]')?.classList.remove('on');}
  if(params.has('sort')){state.sort = params.get('sort');document.querySelector(`[data-sort="${state.sort}"]`)?.classList.add('on');document.querySelector('[data-sort="new"]')?.classList.remove('on');}
  applyFilters();
}

init();
</script>
