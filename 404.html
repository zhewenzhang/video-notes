<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - 页面未找到 - 小视频大思考</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --primary: #2563eb;
      --secondary: #64748b;
      --border: #e2e8f0;
      --card-bg: #f8fafc;
    }
    [data-dark] {
      --bg: #0f172a;
      --text: #e2e8f0;
      --primary: #60a5fa;
      --secondary: #94a3b8;
      --border: #1e293b;
      --card-bg: #1e293b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      transition: background 0.3s, color 0.3s;
    }
    .container { max-width: 900px; margin: 0 auto; padding: 20px; }
    header {
      padding: 40px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 40px;
    }
    header h1 { font-size: 2rem; margin-bottom: 10px; }
    header p { color: var(--secondary); }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--primary);
      text-decoration: none;
      margin-bottom: 20px;
    }
    .back-link:hover { text-decoration: underline; }
    .meta {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin: 20px 0;
      padding: 15px 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .meta span { color: var(--secondary); font-size: 0.9rem; }
    .tags { display: flex; gap: 8px; flex-wrap: wrap; margin: 20px 0; }
    .tag {
      background: var(--card-bg);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      color: var(--primary);
    }
    .content { font-size: 1.1rem; }
    .content h1, .content h2, .content h3 { margin: 30px 0 15px; }
    .content h2 { border-bottom: 2px solid var(--border); padding-bottom: 10px; }
    .content p { margin: 15px 0; }
    .content blockquote {
      border-left: 4px solid var(--primary);
      padding-left: 20px;
      margin: 20px 0;
      color: var(--secondary);
      font-style: italic;
    }
    .content pre {
      background: var(--card-bg);
      padding: 20px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 20px 0;
    }
    .content code {
      background: var(--card-bg);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.9em;
    }
    .content table {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0;
    }
    .content td, .content th {
      border: 1px solid var(--border);
      padding: 12px;
      text-align: left;
    }
    .content tr:nth-child(even) { background: var(--card-bg); }
    .progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      height: 3px;
      background: var(--primary);
      width: 0%;
      transition: width 0.1s;
      z-index: 1000;
    }
    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      padding: 10px 15px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.2rem;
    }
    footer {
      margin-top: 60px;
      padding: 30px 0;
      border-top: 1px solid var(--border);
      text-align: center;
      color: var(--secondary);
    }
    .nav-buttons {
      display: flex;
      justify-content: space-between;
      margin-top: 40px;
      padding-top: 30px;
      border-top: 1px solid var(--border);
    }
    .nav-button {
      color: var(--primary);
      text-decoration: none;
      padding: 10px 20px;
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .nav-button:hover { background: var(--card-bg); }
    
    /* 索引页样式 */
    .search-box {
      width: 100%;
      padding: 15px;
      font-size: 1rem;
      border: 2px solid var(--border);
      border-radius: 12px;
      margin: 20px 0;
      background: var(--bg);
      color: var(--text);
    }
    .note-grid {
      display: grid;
      gap: 20px;
      margin-top: 30px;
    }
    .note-card {
      background: var(--card-bg);
      padding: 25px;
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    .note-card h2 { margin-bottom: 10px; }
    .note-card h2 a {
      color: var(--text);
      text-decoration: none;
    }
    .note-card h2 a:hover { color: var(--primary); }
    .note-meta {
      display: flex;
      gap: 15px;
      color: var(--secondary);
      font-size: 0.9rem;
      margin: 10px 0;
    }
    .note-summary { color: var(--secondary); margin: 15px 0; }
    
    @media (max-width: 600px) {
      .container { padding: 15px; }
      header { padding: 20px 0; }
      header h1 { font-size: 1.5rem; }
      .meta { flex-direction: column; gap: 10px; }
      .nav-buttons { flex-direction: column; gap: 10px; }
    }
  </style>
</head>
<body>
  <div class="progress-bar" id="progressBar"></div>
  <button class="theme-toggle" id="themeToggle" title="切换深色模式">🌙</button>
  
  <div class="container">
    
    <header>
      <h1>404 - 页面未找到</h1>
      <p>哎呀，这个笔记好像不存在...</p>
    </header>
    <a href="../index.html" class="back-link">← 返回首页</a>
  
    
    <footer>
      <p>由小爪 🐾 整理 · 每晚更新，晨间阅读</p>
      <p style="margin-top: 10px;">
        <a href="https://github.com/zhewenzhang/video-notes" style="color: var(--primary);">GitHub</a>
      </p>
    </footer>
  </div>
  
  <script>
    // 深色模式
    const toggle = document.getElementById('themeToggle');
    const html = document.documentElement;
    
    // 检查系统偏好
    if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
      html.setAttribute('data-dark', '');
      toggle.textContent = '☀️';
    }
    
    toggle.addEventListener('click', () => {
      if (html.hasAttribute('data-dark')) {
        html.removeAttribute('data-dark');
        toggle.textContent = '🌙';
      } else {
        html.setAttribute('data-dark', '');
        toggle.textContent = '☀️';
      }
    });
    
    // 阅读进度
    window.addEventListener('scroll', () => {
      const bar = document.getElementById('progressBar');
      const scrolled = (window.scrollY / (document.body.scrollHeight - window.innerHeight)) * 100;
      bar.style.width = scrolled + '%';
    });
    
    // 搜索功能（索引页）
    const searchInput = document.getElementById('searchInput');
    if (searchInput) {
      searchInput.addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase();
        const cards = document.querySelectorAll('.note-card');
        cards.forEach(card => {
          const text = card.textContent.toLowerCase();
          card.style.display = text.includes(query) ? 'block' : 'none';
        });
      });
    }
  </script>
</body>
</html>
